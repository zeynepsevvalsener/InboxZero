name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inboxzero
          POSTGRES_PASSWORD: inboxzero
          POSTGRES_DB: inboxzero_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inboxzero"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://inboxzero:inboxzero@localhost:5432/inboxzero_test
      JWT_SECRET_KEY: ci-test-secret
      AI_PROVIDER: openai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        working-directory: backend
        run: pytest

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build (type-check + compile)
        working-directory: frontend
        run: npm run build
