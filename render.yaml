# Render Blueprint — InboxZero backend (API + worker + Postgres + Redis).
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# The Vercel frontend is deployed separately (see README).
#
# Instance plans are chosen in the Render Dashboard during Blueprint apply
# (nothing is pinned here). Background workers cannot use the free tier — pick
# at least Starter for inboxzero-worker. Celery Beat runs embedded in the worker
# (`--beat`) so no separate beat service is required.
#
# Docker runtime: start commands live in Dockerfile / Dockerfile.worker (Render
# rejects startCommand and preDeployCommand on docker services).

databases:
  - name: inboxzero-db
    databaseName: inboxzero
    user: inboxzero

services:
  # ---- Redis broker (Render "Key Value") ----
  - type: redis
    name: inboxzero-redis
    ipAllowList: [] # only reachable from other Render services
    maxmemoryPolicy: noeviction

  # ---- FastAPI (public) ----
  - type: web
    name: inboxzero-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inboxzero-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: inboxzero-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false # set in dashboard (secret)
      - key: CORS_ORIGINS
        sync: false # set to your Vercel URL after the frontend deploy
      - key: FRONTEND_URL
        sync: false # your Vercel URL
      - key: ENV
        value: production

  # ---- Celery worker (+ embedded beat). Needs a paid instance type. ----
  - type: worker
    name: inboxzero-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile.worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inboxzero-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: inboxzero-redis
          property: connectionString
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
